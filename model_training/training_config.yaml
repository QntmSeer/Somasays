model:
  name: "facebook/esm2_t33_650M_UR50D"
  parameters: "650M"

lora:
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1

training:
  batch_size: 4
  epochs: 3
  learning_rate: 2e-4
  dataset_path: "../data/processed/somasays_dataset.jsonl"
  output_dir: "../weights/somasays_lora_v1"

hardware:
  fp16: true
  gradient_accumulation_steps: 8
